name: 월드컵 점수 자동 업데이트

on:
  schedule:
    - cron: '0 * * * *'  # 1시간마다 실행
  workflow_dispatch:      # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ESPN에서 점수 업데이트
        run: python3 worldcup2026/update_scores.py

      - name: 변경사항 커밋 및 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup2026/worldcup2026.html
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 스킵"
          else
            git commit -m "경기 결과 자동 업데이트"
            git push
          fi

      - name: Slack 알림
        if: hashFiles('changes.txt') != ''
        run: |
          CHANGES=$(cat changes.txt | sed 's/$/\\n/' | tr -d '\n')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"⚽ *FIFA 월드컵 결과 업데이트*\n${CHANGES}\"}"
